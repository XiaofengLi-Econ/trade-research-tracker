name: Cancel stuck Pages deployment

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  cancel:
    runs-on: ubuntu-latest
    steps:
      - name: Cancel stuck Pages deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api --method POST \
            "repos/${GITHUB_REPOSITORY}/pages/deployments/fdfb4f84c74a53267490f46e628257a5689bcaa0/cancel"
