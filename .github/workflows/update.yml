name: Update research tracker

on:
  push:
    branches: ["main"]
  schedule:
    # 06:17 UTC daily. A non-round time reduces peak GitHub Actions load.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# Do not let two scheduled/manual deployments race each other.
concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape economist websites
        run: python scraper/scrape.py

      - name: Commit updated paper data
        run: |
          if git diff --quiet -- data/papers.json site/data/papers.json; then
            echo "No paper updates found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/papers.json site/data/papers.json
          git commit -m "chore: update tracked papers"
          git push

      - name: Assemble static site
        run: |
          mkdir -p _site/data
          cp -R site/. _site/
          cp data/papers.json _site/data/papers.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    needs: update
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
