name: Update research tracker

on:
  push:
    branches: ["main"]
  schedule:
    # 06:17 UTC daily. A non-round time reduces peak GitHub Actions load.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Do not let two scraper runs race each other.
concurrency:
  group: tracker-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Scrape economist websites
        run: python scraper/scrape.py

      - name: Prepare branch-based Pages site
        run: |
          mkdir -p docs/data
          cp site/index.html site/app.js site/style.css docs/
          cp data/papers.json docs/data/papers.json

      - name: Commit updated paper data and site
        run: |
          git add data/papers.json site/data/papers.json docs
          if git diff --cached --quiet; then
            echo "No paper updates found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update tracker site"
          git push
